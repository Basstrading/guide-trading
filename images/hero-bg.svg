<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="none">
  <title>Background pattern</title>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1440" height="600" fill="url(#grid)"/>
  <line x1="200" y1="400" x2="400" y2="300" stroke="#3B82F6" stroke-width="1" opacity="0.04"/>
  <line x1="400" y1="300" x2="500" y2="350" stroke="#3B82F6" stroke-width="1" opacity="0.04"/>
  <line x1="500" y1="350" x2="700" y2="200" stroke="#3B82F6" stroke-width="1" opacity="0.04"/>
  <line x1="700" y1="200" x2="800" y2="250" stroke="#3B82F6" stroke-width="1" opacity="0.04"/>
  <line x1="800" y1="250" x2="1000" y2="150" stroke="#3B82F6" stroke-width="1" opacity="0.04"/>
  <line x1="1000" y1="150" x2="1200" y2="180" stroke="#10B981" stroke-width="1" opacity="0.04"/>
</svg>
